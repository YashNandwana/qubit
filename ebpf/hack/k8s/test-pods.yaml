---
# Test Service A - Makes HTTP requests
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-a
  labels:
    app: service-a
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-a
  template:
    metadata:
      labels:
        app: service-a
    spec:
      containers:
      - name: pinger
        image: curlimages/curl:latest
        command:
        - /bin/sh
        - -c
        - |
          echo "Starting ping-service-a with HTTP requests..."
          while true; do
            echo "=== $(date) ==="
            echo "HTTP to envoy-proxy (→ service-b)..."
            curl -s -o /dev/null -w "%{http_code}" http://envoy-proxy.default.svc:80/ 2>/dev/null || echo "failed"
            echo ""
            echo "HTTP to httpbin..."
            curl -s -o /dev/null -w "%{http_code}" http://httpbin.org/get 2>/dev/null || echo "failed"
            echo ""
            sleep 5
          done
        resources:
          limits:
            memory: "64Mi"
            cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: service-a
spec:
  selector:
    app: service-a
  ports:
  - port: 80
    targetPort: 80
---
# Test Service B - Simple HTTP server + makes requests
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-b
  labels:
    app: service-b
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-b
  template:
    metadata:
      labels:
        app: service-b
    spec:
      containers:
      - name: http-server
        image: nginx:alpine
        ports:
        - containerPort: 80
        resources:
          limits:
            memory: "64Mi"
            cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: service-b
spec:
  selector:
    app: service-b
  ports:
  - port: 80
    targetPort: 80
