---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: qubit-ebpf
  labels:
    app: qubit-ebpf
spec:
  selector:
    matchLabels:
      app: qubit-ebpf
  template:
    metadata:
      labels:
        app: qubit-ebpf
    spec:
      hostNetwork: true
      hostPID: true
      tolerations:
      # Run on all nodes including control-plane
      - operator: Exists
      containers:
      - name: ebpf-loader
        image: qubit-ebpf:latest
        imagePullPolicy: Never  # Use local Kind-loaded image
        securityContext:
          privileged: true
        env:
        - name: RUST_LOG
          value: "info"
        - name: INTERFACE
          value: "eth0"
        - name: CONFIG_PATH
          value: "/app/config.yaml"
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        volumeMounts:
        - name: sys
          mountPath: /sys
        - name: debugfs
          mountPath: /sys/kernel/debug
        resources:
          limits:
            memory: "128Mi"
            cpu: "200m"
      volumes:
      - name: sys
        hostPath:
          path: /sys
      - name: debugfs
        hostPath:
          path: /sys/kernel/debug
