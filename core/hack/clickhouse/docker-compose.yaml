version: "3.8"

services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    environment:
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
      - CLICKHOUSE_PASSWORD=qubit
    ports:
      - "8123:8123"
      - "9001:9000"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144