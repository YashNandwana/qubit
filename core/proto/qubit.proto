syntax = "proto3";
package qubit;

service EventIngestion {
  rpc SendEbpfNetworkEvent(EbpfNetworkEventRequest) returns (EbpfNetworkEventResponse);
  rpc SendPodEvent(PodEventRequest)                 returns (PodEventResponse);
  rpc SendServiceEvent(ServiceEventRequest)         returns (ServiceEventResponse);
  rpc SendConfigMapEvent(ConfigMapEventRequest)     returns (ConfigMapEventResponse);
  rpc SendServicePodMap(ServicePodMapRequest)       returns (ServicePodMapResponse);
}

message EbpfNetworkEventRequest {
  uint64 timestamp_ns = 1;
  uint32 src_ip = 2;
  uint32 dst_ip = 3;
  uint32 src_port = 4;
  uint32 dst_port = 5;
  string method = 6;
  string path = 7;
  string host = 8;
}

message EbpfNetworkEventResponse {
  bool success = 1;
  string message = 2;
}

enum K8sEventType {
  APPLIED = 0;
  DELETED = 1;
}

message PodEventRequest {
  string pod_ip       = 1;
  string namespace    = 2;
  K8sEventType event_type = 3;
  string service_name = 4;
  string service_type = 5;
}

message PodEventResponse {
  bool   success = 1;
  string message = 2;
}

message ServiceEventRequest {
  string name         = 1;
  string namespace    = 2;
  string service_type = 3;
  string cluster_ip   = 4;
  K8sEventType event_type = 5;
}

message ServiceEventResponse {
  bool   success = 1;
  string message = 2;
}

message ConfigMapEventRequest {
  string name      = 1;
  string namespace = 2;
  K8sEventType event_type = 3;
}

message ConfigMapEventResponse {
  bool   success = 1;
  string message = 2;
}

message ServicePodEntry {
  string service_name  = 1;
  string namespace     = 2;
  string service_type  = 3;
  repeated string pod_ips = 4;
}

message ServicePodMapRequest {
  repeated ServicePodEntry entries = 1;
}

message ServicePodMapResponse {
  bool   success = 1;
  string message = 2;
}

// ── Read-path query service ──────────────────────────────────────────

service QubitQuery {
  rpc GetTopology(GetTopologyRequest) returns (GetTopologyResponse);
}

message GetTopologyRequest {}

message GetTopologyResponse {
  // All known services, keyed by "namespace/service_name"
  map<string, TopologyNode> nodes = 1;
  // For each service: who calls it. Keyed by destination "namespace/service_name"
  map<string, FlowList> upstream = 2;
  // For each service: what it calls. Keyed by source "namespace/service_name"
  map<string, FlowList> downstream = 3;
}

message TopologyNode {
  string service_name = 1;
  string namespace = 2;
  string ip = 3;
}

message FlowList {
  repeated TopologyEdge flows = 1;
}

message TopologyEdge {
  string source_service = 1;
  string source_namespace = 2;
  string destination_service = 3;
  string destination_namespace = 4;
  string method = 5;
  string path = 6;
}
