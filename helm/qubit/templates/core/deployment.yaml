apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "qubit.core.fullname" . }}
  labels:
    app: {{ include "qubit.core.fullname" . }}
    {{- include "qubit.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "qubit.core.fullname" . }}
  template:
    metadata:
      labels:
        app: {{ include "qubit.core.fullname" . }}
    spec:
      containers:
        - name: core
          image: "{{ .Values.core.image.repository }}:{{ .Values.core.image.tag }}"
          imagePullPolicy: {{ .Values.core.image.pullPolicy }}
          env:
            - name: RUST_LOG
              value: info
            - name: CONFIG_PATH
              value: /app/config.yaml
          ports:
            - name: grpc
              containerPort: {{ .Values.core.grpcPort }}
            - name: http
              containerPort: {{ .Values.core.httpPort }}
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
          resources:
            {{- toYaml .Values.core.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "qubit.core.fullname" . }}-config
