syntax = "proto3";
package qubit;

// Read-path only — the MCP server is a query client, not a writer.
service QubitQuery {
  rpc GetTopology(GetTopologyRequest) returns (GetTopologyResponse);
}

message GetTopologyRequest {}

message GetTopologyResponse {
  map<string, TopologyNode> nodes = 1;
  map<string, FlowList> upstream = 2;
  map<string, FlowList> downstream = 3;
}

message TopologyNode {
  string application_name = 1;
  string namespace = 2;
  string ip = 3;
}

message FlowList {
  repeated TopologyEdge flows = 1;
}

message TopologyEdge {
  string source_application = 1;
  string source_namespace = 2;
  string destination_application = 3;
  string destination_namespace = 4;
  string method = 5;
  string path = 6;
}
